services:
  # ── Backend (FastAPI) ─────────────────────────────────────
  - type: web
    name: algobot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BINANCE_BASE_URL
        value: https://api.binance.com
      - key: BINANCE_DEMO_URL
        value: https://testnet.binance.vision
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Frontend (Next.js) ────────────────────────────────────
  - type: web
    name: algobot-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://llctmrzftfijdnixcffz.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: PORT
        value: 3000
